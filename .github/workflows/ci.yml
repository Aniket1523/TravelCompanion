name: CI

on:
  push:
    branches: [main, feature/mvp-dev]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: ruff check
        run: ruff check backend/

      - name: black check
        run: black --check backend/

  test-backend:
    name: Backend — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=70
        env:
          PYTHONPATH: backend
          # Supabase env vars — tests are fully mocked, but imports need these
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

  lint-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx next lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # Required by Next.js at build time — point to a placeholder so
          # the build doesn't fail due to missing env vars
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_API_URL: https://placeholder.railway.app
