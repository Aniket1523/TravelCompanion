# Nixpacks build configuration for Railway
# Docs: https://nixpacks.com/docs/configuration/file

[phases.install]
# Install directly from backend/requirements.txt so pip never needs to
# resolve a relative -r reference across a staged Docker layer boundary.
cmds = ["pip install -r backend/requirements.txt"]

[start]
# --app-dir adds backend/ to sys.path, enabling flat imports (from config import ...).
# Railway's startCommand in railway.json takes precedence at runtime but this
# keeps the two in sync for local nixpacks builds.
cmd = "uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT"
